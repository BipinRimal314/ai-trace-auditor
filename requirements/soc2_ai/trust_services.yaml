regulation: "SOC 2 Trust Services Criteria"
article: "Trust Services Criteria"
title: "SOC 2 Trust Services Criteria — AI System Considerations"
legal_reference: "AICPA Trust Services Criteria (2017), with AI implementation guidance"
framework_nature: "audit_framework"
status: "beta"
verified_against_primary: false
verification_note: >
  There is no official "SOC 2 AI Addendum" published by AICPA. The TSC criterion
  IDs (CC6.1, CC7.2, CC8.1, A1.2, PI1.1, C1.1) are real Trust Services Criteria,
  but their application to AI systems is our interpretation, not an AICPA
  requirement. AICPA has published guidance on AI considerations but not a
  formal addendum. This file should be labeled as "AI implementation guidance
  for SOC 2" rather than a standalone standard.

# NOTE: SOC 2 audits are attestation engagements where an auditor evaluates
# controls. The criteria below are real TSC points, but SOC 2 does not prescribe
# specific technical implementations. Evidence fields are implementation guidance
# for how trace data can support a SOC 2 audit, not SOC 2 requirements.

requirements:
  - id: "SOC2-AI-CC6.1"
    title: "Logical access to AI systems"
    description: >
      The entity implements logical access security software, infrastructure,
      and architectures over protected information assets to protect them
      from security events.
    legal_text: "CC6.1 — Logical and Physical Access Controls"
    severity: "mandatory"
    applies_to: ["all"]
    evidence_fields:
      - field_path: "spans[].provider"
        description: "AI provider access points are documented"
        required: false
        check_type: "non_null"
        note: "Implementation guidance — provider tracking helps document third-party access, but SOC 2 access controls require organizational controls beyond traces"
      - field_path: "spans[].trace_id"
        description: "Operations are uniquely identifiable"
        required: false
        check_type: "non_null"
        note: "Implementation guidance — traceability supports access control auditing"

  - id: "SOC2-AI-CC7.2"
    title: "AI system monitoring"
    description: >
      The entity monitors system components and the operation of those
      components for anomalies that are indicative of malicious acts,
      natural disasters, and errors affecting the entity's ability to
      meet its objectives.
    legal_text: "CC7.2 — System Monitoring"
    severity: "mandatory"
    applies_to: ["all"]
    evidence_fields:
      - field_path: "spans[].error_type"
        description: "Error events captured for anomaly detection"
        required: false
        check_type: "present"
        note: "Implementation guidance — supports monitoring objective"
      - field_path: "spans[].finish_reasons"
        description: "Output completion status monitored"
        required: false
        check_type: "present"
        note: "Implementation guidance — unexpected termination may indicate anomalies"

  - id: "SOC2-AI-CC8.1"
    title: "AI system change management"
    description: >
      The entity authorizes, designs, develops or acquires, configures,
      documents, tests, approves, and implements changes to infrastructure,
      data, software, and procedures to meet its objectives.
    legal_text: "CC8.1 — Change Management"
    severity: "mandatory"
    applies_to: ["all"]
    evidence_fields:
      - field_path: "spans[].model_used"
        description: "Active model version recorded per operation"
        required: false
        check_type: "non_null"
        note: "Implementation guidance — model version tracking helps detect unauthorized changes"
      - field_path: "spans[].model_requested"
        description: "Requested vs actual model tracked"
        required: false
        check_type: "non_null"
        note: "Implementation guidance — discrepancies may indicate routing changes"

  - id: "SOC2-AI-A1.2"
    title: "AI system availability"
    description: >
      The entity authorizes, designs, develops or acquires, implements,
      operates, approves, maintains, and monitors environmental protections,
      software, data backup, and recovery infrastructure to meet its objectives.
    legal_text: "A1.2 — Recovery and Continuity"
    severity: "mandatory"
    applies_to: ["all"]
    evidence_fields:
      - field_path: "spans[].start_time"
        description: "Operation timing for availability measurement"
        required: false
        check_type: "non_null"
        note: "Implementation guidance — timestamps support availability reporting"
      - field_path: "spans[].error_type"
        description: "Failure events for availability reporting"
        required: false
        check_type: "present"
        note: "Implementation guidance — error rates help measure availability"

  - id: "SOC2-AI-PI1.1"
    title: "AI processing integrity"
    description: >
      The entity implements policies and procedures over system processing
      to result in products, services, and reporting to meet the entity's
      objectives.
    legal_text: "PI1.1 — Processing Integrity"
    severity: "mandatory"
    applies_to: ["all"]
    evidence_fields:
      - field_path: "spans[].finish_reasons"
        description: "Processing completed with expected termination"
        required: false
        check_type: "non_empty"
        note: "Implementation guidance — completion status indicates processing integrity"

  - id: "SOC2-AI-C1.1"
    title: "AI data confidentiality"
    description: >
      The entity identifies and maintains confidential information to meet
      the entity's objectives related to confidentiality.
    legal_text: "C1.1 — Confidentiality"
    severity: "mandatory"
    applies_to: ["all"]
    evidence_fields:
      - field_path: "spans[].provider"
        description: "Third-party data recipients identified"
        required: false
        check_type: "non_null"
        note: "Implementation guidance — knowing which providers receive data supports confidentiality controls"
