regulation: "EU AI Act"
article: "Annex IV"
title: "Technical documentation referred to in Article 11(1)"
legal_reference: "Regulation (EU) 2024/1689, Annex IV, pp. 130-131"
framework_nature: "law"

# NOTE: downgraded to `verified_against_primary: false` pending migration to
# the Sprint 1 exact_quote + source-pinning regime. The post-v0.14 audit
# (docs/requirement-audit-2026-04-06.md) fixed fabrications here, but the
# per-requirement `exact_quote` fields and registry-pinned source are not
# yet populated. Until they are, the file cannot be CI-gated. See
# verification/quote_validator.py; Article 12 and Article 19 are the
# migrated reference.
verified_against_primary: false
verified_date: "2026-04-07"

# NOTE: Annex IV defines what must be in the TECHNICAL DOCUMENTATION for
# high-risk AI systems. Most items are documentation requirements (what must
# exist in a document), not runtime trace requirements. Only a few sections
# have direct connection to trace data. Items marked check_type: "organizational"
# cannot be verified by trace inspection — they require reviewing the actual
# technical documentation package.

requirements:
  # --- Section 1: General description ---

  - id: "EU-AIA-IV-1a"
    title: "Intended purpose and provider identification"
    description: >
      A general description of the AI system including its intended purpose,
      the name of the provider and the version of the system reflecting its
      relation to previous versions.
    legal_text: "Annex IV, 1(a)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    compliance_tier: "structural"
    evidence_fields:
      - field_path: "spans[].provider"
        description: "Provider name present in traces supports documentation claim"
        required: false
        check_type: "non_null"
        note: "Implementation guidance — traces can corroborate provider identity documented in tech docs"

  - id: "EU-AIA-IV-1b"
    title: "System interaction description"
    description: >
      How the AI system interacts with, or can be used to interact with,
      hardware or software, including other AI systems, that are not part
      of the AI system itself, where applicable.
    legal_text: "Annex IV, 1(b)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: "Documentation requirement. Cannot be verified by trace inspection."

  - id: "EU-AIA-IV-1c"
    title: "Software and firmware versions"
    description: >
      The versions of relevant software or firmware, and any requirements
      related to version updates.
    legal_text: "Annex IV, 1(c)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    compliance_tier: "structural"
    evidence_fields:
      - field_path: "spans[].model_used"
        description: "Model version tracking supports version documentation"
        required: false
        check_type: "non_null"
        note: "Implementation guidance — model versions in traces corroborate version documentation"

  - id: "EU-AIA-IV-1d"
    title: "Distribution form description"
    description: >
      The description of all the forms in which the AI system is placed on the
      market or put into service, such as software packages embedded into
      hardware, downloads, or APIs.
    legal_text: "Annex IV, 1(d)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: "Documentation requirement."

  - id: "EU-AIA-IV-1e"
    title: "Hardware description"
    description: >
      The description of the hardware on which the AI system is intended to run.
    legal_text: "Annex IV, 1(e)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: "Documentation requirement."

  - id: "EU-AIA-IV-1h"
    title: "Instructions for use"
    description: >
      Instructions for use for the deployer, and a basic description of the
      user-interface provided to the deployer, where applicable.
    legal_text: "Annex IV, 1(h)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: "Documentation requirement."

  # --- Section 2: Development process ---

  - id: "EU-AIA-IV-2a"
    title: "Development methods documentation"
    description: >
      The methods and steps performed for the development of the AI system,
      including, where relevant, recourse to pre-trained systems or tools
      provided by third parties and how those were used, integrated or
      modified by the provider.
    legal_text: "Annex IV, 2(a)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: "Documentation requirement."

  - id: "EU-AIA-IV-2b"
    title: "Design specifications and algorithms"
    description: >
      The design specifications of the system, namely the general logic of
      the AI system and of the algorithms; the key design choices including
      the rationale and assumptions made; the main classification choices;
      what the system is designed to optimise for; the description of the
      expected output and output quality; the decisions about trade-offs
      regarding technical solutions adopted to comply with Chapter III, Section 2.
    legal_text: "Annex IV, 2(b)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: "Documentation requirement."

  - id: "EU-AIA-IV-2c"
    title: "System architecture description"
    description: >
      The description of the system architecture explaining how software
      components build on or feed into each other and integrate into the
      overall processing; the computational resources used to develop,
      train, test and validate the AI system.
    legal_text: "Annex IV, 2(c)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: "Documentation requirement."

  - id: "EU-AIA-IV-2d"
    title: "Data requirements and training data"
    description: >
      Where relevant, the data requirements in terms of datasheets describing
      the training methodologies and techniques and the training data sets used,
      including information about their provenance, scope and main characteristics;
      how the data was obtained and selected; labelling procedures; data cleaning
      methodologies.
    legal_text: "Annex IV, 2(d)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: "Documentation requirement."

  - id: "EU-AIA-IV-2e"
    title: "Human oversight assessment"
    description: >
      Assessment of the human oversight measures needed in accordance with
      Article 14, including an assessment of the technical measures needed
      to facilitate the interpretation of the outputs of AI systems by
      the deployers, in accordance with Article 13(3), point (d).
    legal_text: "Annex IV, 2(e)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: "Documentation requirement."

  - id: "EU-AIA-IV-2g"
    title: "Validation and testing procedures"
    description: >
      The validation and testing procedures used, including information about
      the validation and testing data used and their main characteristics;
      metrics used to measure accuracy, robustness and compliance with other
      relevant requirements; potentially discriminatory impacts; test logs
      and all test reports dated and signed by the responsible persons.
    legal_text: "Annex IV, 2(g)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: "Documentation requirement. Test logs are organizational artifacts, not runtime traces."

  - id: "EU-AIA-IV-2h"
    title: "Cybersecurity measures"
    description: >
      Cybersecurity measures put in place.
    legal_text: "Annex IV, 2(h)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: "Documentation requirement."

  # --- Section 3: Monitoring and performance ---

  - id: "EU-AIA-IV-3"
    title: "Monitoring, functioning and control information"
    description: >
      Detailed information about the monitoring, functioning and control of
      the AI system, in particular with regard to: its capabilities and
      limitations in performance; the degrees of accuracy for specific
      persons or groups; the foreseeable unintended outcomes and sources of
      risks to health and safety, fundamental rights and discrimination;
      the human oversight measures needed in accordance with Article 14;
      specifications on input data, as appropriate.
    legal_text: "Annex IV, 3"
    severity: "mandatory"
    applies_to: ["high_risk"]
    compliance_tier: "structural"
    evidence_fields:
      - field_path: "spans[].start_time"
        description: "Monitoring activity is occurring (timestamped operations)"
        required: false
        check_type: "non_null"
        note: "Implementation guidance — active traces demonstrate monitoring capability"

  # --- Sections 4-9: Other documentation ---

  - id: "EU-AIA-IV-4"
    title: "Performance metrics appropriateness"
    description: >
      A description of the appropriateness of the performance metrics for
      the specific AI system.
    legal_text: "Annex IV, 4"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: "Documentation requirement."

  - id: "EU-AIA-IV-5"
    title: "Risk management system description"
    description: >
      A detailed description of the risk management system in accordance
      with Article 9.
    legal_text: "Annex IV, 5"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: "Documentation requirement."

  - id: "EU-AIA-IV-6"
    title: "Lifecycle changes description"
    description: >
      A description of relevant changes made by the provider to the system
      through its lifecycle.
    legal_text: "Annex IV, 6"
    severity: "mandatory"
    applies_to: ["high_risk"]
    compliance_tier: "structural"
    evidence_fields:
      - field_path: "spans[].model_used"
        description: "Model version changes over time document lifecycle changes"
        required: false
        check_type: "non_null"
        note: "Implementation guidance — version drift in traces supports lifecycle change documentation"

  - id: "EU-AIA-IV-8"
    title: "EU declaration of conformity"
    description: >
      A copy of the EU declaration of conformity referred to in Article 47.
    legal_text: "Annex IV, 8"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: "Documentation requirement."

  - id: "EU-AIA-IV-9"
    title: "Post-market monitoring system"
    description: >
      A detailed description of the system in place to evaluate the AI system
      performance in the post-market phase in accordance with Article 72,
      including the post-market monitoring plan referred to in Article 72(3).
    legal_text: "Annex IV, 9"
    severity: "mandatory"
    applies_to: ["high_risk"]
    compliance_tier: "structural"
    evidence_fields:
      - field_path: "spans[].start_time"
        description: "Active post-market traces demonstrate monitoring is in place"
        required: false
        check_type: "non_null"
        note: "Implementation guidance — ongoing trace collection is evidence of post-market monitoring"
