regulation: "EU AI Act"
article: "Article 50"
title: "Transparency obligations for providers and deployers of certain AI systems"
legal_reference: "Regulation (EU) 2024/1689, Article 50, pp. 82-83"
framework_nature: "law"

# NOTE: downgraded to `verified_against_primary: false` pending migration to
# the Sprint 1 exact_quote + source-pinning regime. Article 50's provisions
# (chatbots, synthetic-content labelling, deepfakes, emotion recognition)
# are high-value targets for the next migration wave — see Article 12
# (requirements/eu_ai_act/article_12.yaml) for the template.
verified_against_primary: false
verified_date: "2026-04-07"

# NOTE: Article 50 applies broadly — not just to high-risk systems. It covers:
# - AI systems interacting with people (chatbots) → 50(1)
# - AI generating synthetic content (text, image, audio, video) → 50(2)
# - Emotion recognition / biometric categorisation → 50(3)
# - Deep fakes → 50(4)
# These are CHAPTER IV obligations, separate from Chapter III high-risk requirements.

requirements:
  # --- 50(1): AI interaction disclosure ---

  - id: "EU-AIA-50.1"
    title: "AI interaction disclosure"
    description: >
      Providers shall ensure that AI systems intended to interact directly with
      natural persons are designed and developed in such a way that the natural
      persons concerned are informed that they are interacting with an AI system,
      unless this is obvious from the point of view of a natural person who is
      reasonably well-informed, observant and circumspect, taking into account
      the circumstances and the context of use.
    legal_text: "Article 50(1)"
    severity: "mandatory"
    applies_to: ["all", "human_interaction"]
    compliance_tier: "deterministic"
    evidence_fields:
      - field_path: "spans[].ai_disclosure"
        description: "AI disclosure marker present in system output or interaction"
        required: true
        check_type: "present"
        note: "Tier 1 — law requires disclosure. Check for disclosure marker, system prompt instruction, or UI-level indicator."
    exemptions:
      - "Obviously AI from context (reasonably well-informed person would know)"
      - "AI systems authorised by law for criminal offence detection/prevention/prosecution"

  # --- 50(2): Machine-readable AI content marking ---

  - id: "EU-AIA-50.2"
    title: "AI-generated content marking"
    description: >
      Providers of AI systems, including general-purpose AI systems, generating
      synthetic audio, image, video or text content, shall ensure that the outputs
      of the AI system are marked in a machine-readable format and detectable as
      artificially generated or manipulated. Providers shall ensure their technical
      solutions are effective, interoperable, robust and reliable.
    legal_text: "Article 50(2)"
    severity: "mandatory"
    applies_to: ["all", "content_generation"]
    compliance_tier: "deterministic"
    evidence_fields:
      - field_path: "spans[].content_marking"
        description: "Machine-readable marking on AI-generated content (C2PA, watermark, metadata)"
        required: true
        check_type: "present"
        note: "Tier 1 — law requires machine-readable marking. Check for C2PA manifest, watermark metadata, or equivalent."
      - field_path: "spans[].output_messages"
        description: "Generated content available for marking verification"
        required: false
        check_type: "non_empty"
        note: "Implementation guidance — content must exist to verify marking"
    exemptions:
      - "Assistive function for standard editing that does not substantially alter input"
      - "AI authorised by law for criminal offence detection/prevention/prosecution"

  # --- 50(3): Emotion recognition / biometric disclosure ---

  - id: "EU-AIA-50.3"
    title: "Emotion recognition and biometric categorisation disclosure"
    description: >
      Deployers of an emotion recognition system or a biometric categorisation
      system shall inform the natural persons exposed thereto of the operation
      of the system, and shall process the personal data in accordance with
      Regulations (EU) 2016/679, (EU) 2018/1725 and Directive (EU) 2016/680.
    legal_text: "Article 50(3)"
    severity: "mandatory"
    applies_to: ["emotion_recognition", "biometric_categorisation"]
    compliance_tier: "deterministic"
    evidence_fields: []
    note: >
      Applies to deployers of emotion recognition and biometric categorisation
      systems. Requires informing exposed persons AND GDPR-compliant data processing.
      Cannot be fully verified by trace inspection — requires UI/process review.
    exemptions:
      - "Systems permitted by law for criminal offence detection/prevention/investigation"

  # --- 50(4): Deep fake disclosure ---

  - id: "EU-AIA-50.4a"
    title: "Deep fake image/audio/video disclosure"
    description: >
      Deployers of an AI system that generates or manipulates image, audio or
      video content constituting a deep fake, shall disclose that the content
      has been artificially generated or manipulated.
    legal_text: "Article 50(4), first subparagraph"
    severity: "mandatory"
    applies_to: ["all", "deep_fake"]
    compliance_tier: "deterministic"
    evidence_fields:
      - field_path: "spans[].content_marking"
        description: "Deep fake disclosure marker on generated content"
        required: true
        check_type: "present"
        note: "Tier 1 — law requires disclosure of deep fakes"
    exemptions:
      - "Authorised by law for criminal offence detection/prevention/prosecution"
      - "Evidently artistic, creative, satirical, fictional content — limited to non-hampering disclosure"

  - id: "EU-AIA-50.4b"
    title: "AI-generated text disclosure (public interest)"
    description: >
      Deployers of an AI system that generates or manipulates text which is
      published with the purpose of informing the public on matters of public
      interest shall disclose that the text has been artificially generated
      or manipulated.
    legal_text: "Article 50(4), second subparagraph"
    severity: "mandatory"
    applies_to: ["all", "text_generation", "public_interest"]
    compliance_tier: "deterministic"
    evidence_fields:
      - field_path: "spans[].ai_disclosure"
        description: "AI-generated text disclosure for public-interest content"
        required: true
        check_type: "present"
        note: "Tier 1 — law requires disclosure when AI text informs the public"
    exemptions:
      - "Authorised by law for criminal offence detection/prevention/prosecution"
      - "AI-generated content that has undergone human review or editorial control AND a natural or legal person holds editorial responsibility"

  # --- 50(5): Timing and accessibility ---

  - id: "EU-AIA-50.5"
    title: "Disclosure timing and clarity"
    description: >
      The information referred to in paragraphs 1 to 4 shall be provided to
      the natural persons concerned in a clear and distinguishable manner at
      the latest at the time of the first interaction or exposure. The
      information shall conform to the applicable accessibility requirements.
    legal_text: "Article 50(5)"
    severity: "mandatory"
    applies_to: ["all"]
    compliance_tier: "deterministic"
    evidence_fields:
      - field_path: "spans[].start_time"
        description: "First interaction timestamp — disclosure must occur at or before this point"
        required: false
        check_type: "non_null"
        note: "Implementation guidance — timing verification requires UI/UX review, not just trace data"
