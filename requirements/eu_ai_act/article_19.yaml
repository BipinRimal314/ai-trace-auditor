regulation: "EU AI Act"
article: "Article 19"
title: "Automatically generated logs"
legal_reference: "Regulation (EU) 2024/1689, Article 19, pp. 64"
framework_nature: "law"
verified_against_primary: true
verified_date: "2026-04-06"

requirements:
  - id: "EU-AIA-19.1"
    title: "Log retention by providers"
    description: >
      Providers of high-risk AI systems shall keep the logs referred to in
      Article 12(1), automatically generated by their high-risk AI systems,
      to the extent such logs are under their control. Without prejudice to
      applicable Union or national law, the logs shall be kept for a period
      appropriate to the intended purpose of the high-risk AI system, of at
      least six months, unless provided otherwise in the applicable Union or
      national law, in particular in Union law on the protection of personal data.
    legal_text: "Article 19(1)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    evidence_fields:
      - field_path: "spans[].start_time"
        description: "Timestamps must be present to verify retention period compliance"
        required: true
        check_type: "non_null"
        note: "Verifiable proxy — if logs exist with timestamps, retention can be assessed"

  - id: "EU-AIA-19.2"
    title: "Financial institution log maintenance"
    description: >
      Providers that are financial institutions subject to requirements regarding
      their internal governance, arrangements or processes under Union financial
      services law shall maintain the logs automatically generated by their
      high-risk AI systems as part of the documentation kept under the relevant
      financial services law.
    legal_text: "Article 19(2)"
    severity: "mandatory"
    applies_to: ["high_risk", "financial_institution"]
    evidence_fields: []
    note: >
      This is an organizational/process obligation, not a technical check.
      Compliance depends on whether the entity is a financial institution and
      whether logs are integrated into their financial services documentation.
      Cannot be verified by automated trace inspection alone.
