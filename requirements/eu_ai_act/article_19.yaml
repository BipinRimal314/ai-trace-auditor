regulation: "EU AI Act"
article: "Article 19"
title: "Automatically Generated Logs — Retention"

requirements:
  - id: "EU-AIA-19.1"
    title: "Log retention capability"
    description: >
      Providers of high-risk AI systems shall keep the logs referred to in
      Article 12 automatically generated by their high-risk AI systems, to the
      extent such logs are under their control. The logs shall be kept for a
      period appropriate to the intended purpose of the high-risk AI system,
      of at least six months, unless provided otherwise in applicable Union or
      national law.
    severity: "mandatory"
    applies_to: ["high_risk"]
    evidence_fields:
      - field_path: "spans[].start_time"
        description: "Timestamps must be present to verify retention period compliance"
        required: true
        check_type: "non_null"

  - id: "EU-AIA-19.2"
    title: "Response identification for retention"
    description: >
      Each AI-generated response must be uniquely identifiable to support
      retrieval during audits and incident investigations within the
      retention period.
    severity: "mandatory"
    applies_to: ["high_risk"]
    evidence_fields:
      - field_path: "spans[].response_id"
        description: "Unique response identifier from the AI provider"
        required: true
        check_type: "non_null"
      - field_path: "spans[].span_id"
        description: "Unique span identifier for trace correlation"
        required: true
        check_type: "non_null"
