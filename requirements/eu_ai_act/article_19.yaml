regulation: "EU AI Act"
article: "Article 19"
title: "Automatically generated logs"
legal_reference: "Regulation (EU) 2024/1689, Article 19"
framework_nature: "law"

source: "eu-ai-act-2024-1689"
verified_against_primary: true
verified_date: "2026-04-17"
verified_by: "bipin"

requirements:
  - id: "EU-AIA-19.1"
    title: "Log retention by providers"
    description: >
      Providers of high-risk AI systems must keep the logs referred to in
      Article 12(1), automatically generated by their high-risk AI systems,
      to the extent such logs are under their control. Logs must be retained
      for a period appropriate to the intended purpose and at least six
      months, unless Union or national law says otherwise.
    legal_text: "Article 19(1)"
    exact_quote: >-
      Providers of high-risk AI systems shall keep the logs referred to in
      Article 12(1), automatically generated by their high-risk AI systems,
      to the extent such logs are under their control. Without prejudice to
      applicable Union or national law, the logs shall be kept for a period
      appropriate to the intended purpose of the high-risk AI system, of at
      least six months, unless provided otherwise in the applicable Union or
      national law, in particular in Union law on the protection of personal
      data.
    severity: "mandatory"
    applies_to: ["high_risk"]
    compliance_tier: "deterministic"
    evidence_fields:
      - field_path: "spans[].start_time"
        description: >
          Span timestamps are required to verify the six-month retention
          window: without a persisted time reference on each logged event,
          retention compliance cannot be assessed from the traces.
        required: true
        check_type: "non_null"
        legal_basis: "direct"
        source_quote: >-
          the logs shall be kept for a period appropriate to the intended
          purpose of the high-risk AI system, of at least six months

  - id: "EU-AIA-19.2"
    title: "Financial institution log maintenance"
    description: >
      Providers that are financial institutions subject to Union financial
      services law must maintain the logs automatically generated by their
      high-risk AI systems as part of the documentation kept under the
      relevant financial services law.
    legal_text: "Article 19(2)"
    exact_quote: >-
      Providers that are financial institutions subject to requirements
      regarding their internal governance, arrangements or processes under
      Union financial services law shall maintain the logs automatically
      generated by their high-risk AI systems as part of the documentation
      kept under the relevant financial services law.
    severity: "mandatory"
    applies_to: ["high_risk", "financial_institution"]
    # Organizational: compliance depends on integration with a separate
    # financial-services documentation regime; trace inspection alone cannot
    # verify it. `evidence_fields` intentionally empty.
    check_type: "organizational"
    evidence_fields: []
    note: >
      This is an organizational / process obligation, not a technical
      check. Whether a provider qualifies as a "financial institution" and
      whether logs are integrated into their financial-services
      documentation cannot be determined by automated trace inspection.
      Surface as a documentation checklist entry, not a trace-level
      pass/fail.
