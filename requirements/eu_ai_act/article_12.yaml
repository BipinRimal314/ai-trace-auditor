regulation: "EU AI Act"
article: "Article 12"
title: "Record-keeping"
legal_reference: "Regulation (EU) 2024/1689, Article 12, pp. 59"
framework_nature: "law"
verified_against_primary: true
verified_date: "2026-04-06"

requirements:
  # --- General requirements (all high-risk AI systems) ---

  - id: "EU-AIA-12.1"
    title: "Automatic event logging"
    description: >
      High-risk AI systems shall technically allow for the automatic recording
      of events (logs) over the lifetime of the system.
    legal_text: "Article 12(1)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    evidence_fields:
      - field_path: "spans[].start_time"
        description: "Timestamp proving automatic logging is occurring"
        required: true
        check_type: "non_null"
        note: "Implementation guidance — law requires automatic logging but does not prescribe specific fields"

  - id: "EU-AIA-12.2a"
    title: "Risk situation identification"
    description: >
      Logging capabilities shall enable the recording of events relevant for
      identifying situations that may result in the high-risk AI system presenting
      a risk within the meaning of Article 79(1) or in a substantial modification.
    legal_text: "Article 12(2)(a)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    evidence_fields:
      - field_path: "spans[].error_type"
        description: "Error classification when operations fail"
        required: false
        check_type: "present"
        note: "Implementation guidance — law requires risk-relevant event capture but does not prescribe specific fields"
      - field_path: "spans[].finish_reasons"
        description: "Operation completion status"
        required: false
        check_type: "present"
        note: "Implementation guidance — not a legal requirement, but a reasonable proxy for risk detection"

  - id: "EU-AIA-12.2b"
    title: "Post-market monitoring facilitation"
    description: >
      Logging capabilities shall enable the recording of events relevant for
      facilitating the post-market monitoring referred to in Article 72.
    legal_text: "Article 12(2)(b)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    evidence_fields:
      - field_path: "spans[].model_used"
        description: "Model version used — useful for correlating behavior changes"
        required: false
        check_type: "non_null"
        note: "Implementation guidance — law requires post-market monitoring support but does not specify model tracking"

  - id: "EU-AIA-12.2c"
    title: "Deployer operation monitoring"
    description: >
      Logging capabilities shall enable the recording of events relevant for
      monitoring the operation of high-risk AI systems referred to in Article 26(5).
    legal_text: "Article 12(2)(c)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    evidence_fields:
      - field_path: "spans[].operation"
        description: "Type of operation performed"
        required: false
        check_type: "non_empty"
        note: "Implementation guidance — law requires deployer monitoring support but does not prescribe specific fields"

  # --- Biometric-specific requirements (Annex III, point 1(a) only) ---

  - id: "EU-AIA-12.3a"
    title: "Period of use recording (biometric)"
    description: >
      For high-risk AI systems referred to in point 1(a) of Annex III (biometric
      identification), the logging capabilities shall provide, at a minimum,
      recording of the period of each use of the system (start date and time
      and end date and time of each use).
    legal_text: "Article 12(3)(a)"
    severity: "mandatory"
    applies_to: ["annex_iii_1a_biometric"]
    evidence_fields:
      - field_path: "spans[].start_time"
        description: "Start date and time of each use"
        required: true
        check_type: "non_null"
      - field_path: "spans[].end_time"
        description: "End date and time of each use"
        required: true
        check_type: "non_null"

  - id: "EU-AIA-12.3b"
    title: "Reference database identification (biometric)"
    description: >
      For biometric identification systems, the reference database against which
      input data has been checked by the system must be logged.
    legal_text: "Article 12(3)(b)"
    severity: "mandatory"
    applies_to: ["annex_iii_1a_biometric"]
    evidence_fields:
      - field_path: "spans[].reference_database"
        description: "Reference database identifier checked by the system"
        required: true
        check_type: "non_empty"

  - id: "EU-AIA-12.3c"
    title: "Matching input data recording (biometric)"
    description: >
      For biometric identification systems, the input data for which the search
      has led to a match must be logged.
    legal_text: "Article 12(3)(c)"
    severity: "mandatory"
    applies_to: ["annex_iii_1a_biometric"]
    evidence_fields:
      - field_path: "spans[].matched_input_data"
        description: "Input data that led to a match"
        required: true
        check_type: "non_empty"

  - id: "EU-AIA-12.3d"
    title: "Verification personnel identification (biometric)"
    description: >
      For biometric identification systems, the identification of the natural
      persons involved in the verification of the results, as referred to in
      Article 14(5), must be logged.
    legal_text: "Article 12(3)(d)"
    severity: "mandatory"
    applies_to: ["annex_iii_1a_biometric"]
    evidence_fields:
      - field_path: "spans[].verification_personnel"
        description: "Identity of natural persons who verified results"
        required: true
        check_type: "non_empty"

# --- Implementation guidance (not legal requirements) ---
# The following are best practices for LLM-based AI systems that help satisfy
# the general logging obligations in 12(1) and 12(2). They are NOT mandated
# by Article 12 but represent reasonable implementation choices.
#
# Recommended fields for LLM systems:
#   - operation type (chat, embeddings, completion)
#   - provider name (openai, anthropic, etc.)
#   - model requested vs model used
#   - input/output token counts
#   - latency/duration
#   - temperature, max_tokens, top_p
#   - tool/function calls
#   - span IDs and parent-child relationships
#   - input/output content (with privacy controls)
#
# These should be presented as "recommended" not "mandatory per EU AI Act"
