regulation: "EU AI Act"
article: "Article 12"
title: "Record-Keeping"

requirements:
  - id: "EU-AIA-12.1a"
    title: "Event timestamp recording"
    description: >
      High-risk AI systems shall technically allow for the automatic recording
      of events (logs) over the lifetime of the system. Each AI operation must
      have recorded start and end timestamps.
    severity: "mandatory"
    applies_to: ["high_risk", "all"]
    evidence_fields:
      - field_path: "spans[].start_time"
        description: "Start timestamp for each AI operation"
        required: true
        check_type: "non_null"
      - field_path: "spans[].end_time"
        description: "End timestamp for each AI operation"
        required: true
        check_type: "non_null"

  - id: "EU-AIA-12.1b"
    title: "Operation identification"
    description: >
      Each logged event must be identifiable: what type of AI operation was
      performed, which model was used, and by which provider.
    severity: "mandatory"
    applies_to: ["high_risk", "all"]
    evidence_fields:
      - field_path: "spans[].operation"
        description: "Type of AI operation (chat, embeddings, text_completion, etc.)"
        required: true
        check_type: "non_empty"
      - field_path: "spans[].provider"
        description: "AI provider name (openai, anthropic, google, etc.)"
        required: true
        check_type: "non_null"

  - id: "EU-AIA-12.2a"
    title: "Risk identification logging"
    description: >
      Logging capabilities shall enable the recording of events relevant to
      identifying situations that may result in the AI system presenting a risk.
      This includes error conditions, unexpected termination reasons, and
      failure modes.
    severity: "mandatory"
    applies_to: ["high_risk"]
    evidence_fields:
      - field_path: "spans[].error_type"
        description: "Error classification when operations fail"
        required: true
        check_type: "present"
      - field_path: "spans[].error_message"
        description: "Error details for failed operations"
        required: false
        check_type: "present"
      - field_path: "spans[].finish_reasons"
        description: "Operation completion status (stop, length, content_filter, tool_calls, error)"
        required: true
        check_type: "non_empty"

  - id: "EU-AIA-12.2b"
    title: "Model version tracking"
    description: >
      Logging must facilitate post-market monitoring by tracking which model
      version actually produced each output. This enables correlation of
      behavior changes with model updates.
    severity: "mandatory"
    applies_to: ["high_risk", "all"]
    evidence_fields:
      - field_path: "spans[].model_used"
        description: "Actual model version used (from API response, not just request)"
        required: true
        check_type: "non_null"
      - field_path: "spans[].model_requested"
        description: "Model version requested (from API request)"
        required: false
        check_type: "non_null"

  - id: "EU-AIA-12.2c"
    title: "Resource consumption monitoring"
    description: >
      Token usage and operational metrics must be logged to enable monitoring
      of resource consumption patterns, cost attribution, and detection of
      anomalous usage that could indicate misuse or system degradation.
    severity: "recommended"
    applies_to: ["high_risk", "all"]
    evidence_fields:
      - field_path: "spans[].input_tokens"
        description: "Input/prompt token count per operation"
        required: true
        check_type: "non_null"
      - field_path: "spans[].output_tokens"
        description: "Output/completion token count per operation"
        required: true
        check_type: "non_null"
      - field_path: "spans[].duration_ms"
        description: "Operation latency in milliseconds"
        required: false
        check_type: "non_null"

  - id: "EU-AIA-12.2d"
    title: "Input/output content recording"
    description: >
      For high-risk systems, the actual inputs provided to and outputs generated
      by the AI system should be recorded to enable post-hoc review and audit.
      Note: this is opt-in due to privacy considerations and must be balanced
      against data protection requirements.
    severity: "recommended"
    applies_to: ["high_risk"]
    evidence_fields:
      - field_path: "spans[].input_messages"
        description: "Input prompts/messages sent to the AI model"
        required: false
        check_type: "non_empty"
      - field_path: "spans[].output_messages"
        description: "Output responses generated by the AI model"
        required: false
        check_type: "non_empty"

  - id: "EU-AIA-12.2e"
    title: "Tool and function call logging"
    description: >
      When AI systems use tools, functions, or external data sources, these
      interactions must be logged to maintain a complete audit trail of the
      system's decision-making process.
    severity: "recommended"
    applies_to: ["high_risk"]
    evidence_fields:
      - field_path: "spans[].tool_calls"
        description: "Tool/function calls made by the AI model"
        required: false
        check_type: "present"
      - field_path: "spans[].tools_defined"
        description: "Tools/functions available to the AI model"
        required: false
        check_type: "present"

  - id: "EU-AIA-12.2f"
    title: "Request parameter logging"
    description: >
      Configuration parameters that influence AI behavior (temperature, top_p,
      max_tokens, etc.) must be recorded to enable reproducibility analysis
      and behavior explanation.
    severity: "recommended"
    applies_to: ["high_risk", "all"]
    evidence_fields:
      - field_path: "spans[].temperature"
        description: "Temperature parameter controlling output randomness"
        required: false
        check_type: "non_null"
      - field_path: "spans[].max_tokens"
        description: "Maximum token limit for output generation"
        required: false
        check_type: "non_null"

  - id: "EU-AIA-12.3"
    title: "Trace linkage and causality"
    description: >
      Multi-step AI operations must maintain trace linkage so that the causal
      chain of decisions can be reconstructed. Parent-child span relationships
      must be preserved for agent workflows.
    severity: "mandatory"
    applies_to: ["high_risk"]
    evidence_fields:
      - field_path: "spans[].span_id"
        description: "Unique identifier for each operation span"
        required: true
        check_type: "non_null"
      - field_path: "spans[].parent_span_id"
        description: "Parent span ID for hierarchical trace reconstruction"
        required: false
        check_type: "present"
