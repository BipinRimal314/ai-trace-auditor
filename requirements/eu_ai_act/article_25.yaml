regulation: "EU AI Act"
article: "Article 25"
title: "Responsibilities along the AI value chain"
legal_reference: "Regulation (EU) 2024/1689, Article 25, pp. 67-68"
framework_nature: "law"
verified_against_primary: true
verified_date: "2026-04-06"

# NOTE: Article 25 defines legal responsibilities — when third parties become
# providers under the law. It is NOT about multi-agent AI system logging or
# technical tracing. These requirements are organizational/legal compliance
# checks, not automated trace inspection checks.

requirements:
  - id: "EU-AIA-25.1a"
    title: "Name/trademark provider assumption"
    description: >
      Any distributor, importer, deployer or other third-party that puts their
      name or trademark on a high-risk AI system already placed on the market
      or put into service shall be considered a provider and subject to provider
      obligations under Article 16. This applies without prejudice to contractual
      arrangements stipulating that obligations are otherwise allocated.
    legal_text: "Article 25(1)(a)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: >
      Cannot be verified by automated trace inspection. Requires organizational
      assessment of whether the entity has placed their name/trademark on a
      third-party AI system.

  - id: "EU-AIA-25.1b"
    title: "Substantial modification provider assumption"
    description: >
      Any third party that makes a substantial modification to a high-risk AI
      system that has already been placed on the market or put into service, in
      such a way that it remains high-risk pursuant to Article 6, shall be
      considered a provider and subject to provider obligations under Article 16.
    legal_text: "Article 25(1)(b)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: >
      Cannot be verified by automated trace inspection. Requires legal
      assessment of whether a substantial modification was made. Tracking
      model version changes (spans[].model_used) may help detect potential
      substantial modifications but is not a legal requirement.

  - id: "EU-AIA-25.1c"
    title: "Intended purpose modification"
    description: >
      Any third party that modifies the intended purpose of an AI system,
      including a general-purpose AI system, which has not been classified as
      high-risk and has already been placed on the market or put into service,
      in such a way that the system becomes high-risk per Article 6, shall be
      considered a provider.
    legal_text: "Article 25(1)(c)"
    severity: "mandatory"
    applies_to: ["all"]
    check_type: "organizational"
    evidence_fields: []
    note: >
      Cannot be verified by automated trace inspection. Requires assessment of
      whether the intended purpose has been changed to trigger high-risk
      classification.

  - id: "EU-AIA-25.2"
    title: "Original provider cooperation"
    description: >
      Where paragraph 1 applies, the original provider ceases to be a provider
      for that specific AI system. The initial provider shall closely cooperate
      with new providers, make available necessary information, and provide
      reasonably expected technical access and other assistance for compliance,
      in particular regarding conformity assessment of high-risk AI systems.
    legal_text: "Article 25(2)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: >
      Organizational obligation. Not verifiable by trace inspection.

  - id: "EU-AIA-25.4"
    title: "Third-party written agreements"
    description: >
      The provider of a high-risk AI system and any third party that supplies
      tools, services, components, or processes used or integrated in the system
      shall, by written agreement, specify the necessary information, capabilities,
      technical access and other assistance to enable full compliance with the
      obligations set out in this Regulation.
    legal_text: "Article 25(4)"
    severity: "mandatory"
    applies_to: ["high_risk"]
    check_type: "organizational"
    evidence_fields: []
    note: >
      Contractual obligation. The AI Office may develop voluntary model contract
      terms for this purpose. Not verifiable by trace inspection.
