regulation: "NIST AI RMF"
article: "MEASURE"
title: "Measurement and Monitoring"

requirements:
  - id: "NIST-MEASURE-2.1"
    title: "Test and evaluation documentation"
    description: >
      AI system testing, metrics, and TEVV (Test, Evaluation, Verification,
      and Validation) tools shall be documented and traceable. Test sets,
      evaluation metrics, and methodology must be recorded.
    severity: "recommended"
    applies_to: ["all"]
    evidence_fields:
      - field_path: "spans[].evaluations"
        description: "Evaluation scores or quality assessments attached to operations"
        required: false
        check_type: "present"

  - id: "NIST-MEASURE-2.4"
    title: "Production monitoring"
    description: >
      AI system functionality and behavior shall be monitored in deployed
      or operational environments. Operational data must be logged to detect
      performance degradation, drift, or unexpected behavior.
    severity: "mandatory"
    applies_to: ["all"]
    evidence_fields:
      - field_path: "spans[].model_used"
        description: "Model version tracking for detecting behavior changes across updates"
        required: true
        check_type: "non_null"
      - field_path: "spans[].input_tokens"
        description: "Token consumption for monitoring resource usage patterns"
        required: true
        check_type: "non_null"
      - field_path: "spans[].output_tokens"
        description: "Output token count for monitoring generation patterns"
        required: true
        check_type: "non_null"
      - field_path: "spans[].duration_ms"
        description: "Latency monitoring for performance degradation detection"
        required: false
        check_type: "non_null"
      - field_path: "spans[].finish_reasons"
        description: "Completion status monitoring (content filters, length limits, errors)"
        required: true
        check_type: "non_empty"

  - id: "NIST-MEASURE-2.8"
    title: "Transparency documentation"
    description: >
      Risks related to transparency and accountability are documented and
      monitored. The system must log sufficient data to explain its behavior
      to stakeholders.
    severity: "recommended"
    applies_to: ["all"]
    evidence_fields:
      - field_path: "spans[].operation"
        description: "Operation type for understanding what the system did"
        required: true
        check_type: "non_empty"
      - field_path: "spans[].provider"
        description: "Provider identification for accountability"
        required: true
        check_type: "non_null"
      - field_path: "spans[].model_used"
        description: "Model identification for reproducibility"
        required: true
        check_type: "non_null"

  - id: "NIST-MEASURE-2.9"
    title: "Model explainability"
    description: >
      AI model decisions shall be explainable, validated, and documented.
      Sufficient operational data must be logged to support post-hoc
      explanation of system outputs.
    severity: "recommended"
    applies_to: ["all"]
    evidence_fields:
      - field_path: "spans[].input_messages"
        description: "Input data for reproducing and explaining model decisions"
        required: false
        check_type: "non_empty"
      - field_path: "spans[].output_messages"
        description: "Output data for reviewing model decisions"
        required: false
        check_type: "non_empty"
      - field_path: "spans[].temperature"
        description: "Randomness parameter for explaining output variability"
        required: false
        check_type: "non_null"

  - id: "NIST-MEASURE-3.1"
    title: "Risk tracking"
    description: >
      Approaches for tracking existing and emergent AI risks are documented
      and applied. Error tracking and anomaly detection must be in place.
    severity: "mandatory"
    applies_to: ["all"]
    evidence_fields:
      - field_path: "spans[].error_type"
        description: "Error classification for tracking failure patterns"
        required: true
        check_type: "present"
      - field_path: "spans[].error_message"
        description: "Error details for root cause analysis"
        required: false
        check_type: "present"
      - field_path: "spans[].finish_reasons"
        description: "Completion status for detecting content filtering or truncation"
        required: true
        check_type: "non_empty"
