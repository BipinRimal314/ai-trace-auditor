name: "AI Trace Auditor — EU AI Act Compliance Suite"
description: "Audit LLM traces and codebases against EU AI Act Articles 11, 12, 13 and GDPR Article 30. One command, three articles."
author: "Bipin Rimal"

branding:
  icon: "shield"
  color: "green"

inputs:
  command:
    description: "Command to run: comply (full suite), audit (Art 12), docs (Art 11), flow (Art 13)"
    required: false
    default: "comply"
  path:
    description: "Codebase directory to scan (for comply/docs/flow) or trace file (for audit)"
    required: false
    default: "."
  traces:
    description: "Path to trace file or directory for Article 12 audit"
    required: false
    default: ""
  output:
    description: "Output file or directory path"
    required: false
    default: "compliance-report.md"
  split:
    description: "Write individual report files to output directory (comply only)"
    required: false
    default: "false"
  regulation:
    description: "Filter to specific regulation (audit only)"
    required: false
    default: ""
  risk-level:
    description: "Risk classification (high_risk, all)"
    required: false
    default: "high_risk"
  format:
    description: "Trace input format (auto, otel, langfuse, claude_code, raw)"
    required: false
    default: "auto"
  report-format:
    description: "Report output format (markdown, json, both) — audit only"
    required: false
    default: "markdown"
  fail-on-gaps:
    description: "Fail the action if compliance gaps are found"
    required: false
    default: "true"
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"

outputs:
  compliance-score:
    description: "Overall compliance score (0-100), empty if no traces"
    value: ${{ steps.run.outputs.score }}
  exit-code:
    description: "Exit code (0 = pass, 1 = gaps found)"
    value: ${{ steps.run.outputs.exit_code }}
  report-path:
    description: "Path to the generated report"
    value: ${{ inputs.output }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install AI Trace Auditor
      shell: bash
      run: pip install ai-trace-auditor

    - name: Run compliance check
      id: run
      shell: bash
      run: |
        set +e

        COMMAND="${{ inputs.command }}"
        CMD="aitrace $COMMAND"

        if [ "$COMMAND" = "audit" ]; then
          # Audit mode: path is the trace file
          CMD="$CMD ${{ inputs.path }}"
          if [ -n "${{ inputs.regulation }}" ]; then
            CMD="$CMD -r '${{ inputs.regulation }}'"
          fi
          CMD="$CMD --format ${{ inputs.format }}"
          CMD="$CMD --report-format ${{ inputs.report-format }}"
          CMD="$CMD -o ${{ inputs.output }}"
          CMD="$CMD --risk-level ${{ inputs.risk-level }}"
        elif [ "$COMMAND" = "comply" ]; then
          # Comply mode: full suite
          CMD="$CMD ${{ inputs.path }}"
          CMD="$CMD -o ${{ inputs.output }}"
          if [ -n "${{ inputs.traces }}" ]; then
            CMD="$CMD --traces ${{ inputs.traces }}"
          fi
          if [ "${{ inputs.split }}" = "true" ]; then
            CMD="$CMD --split"
          fi
          CMD="$CMD --risk-level ${{ inputs.risk-level }}"
        elif [ "$COMMAND" = "docs" ]; then
          CMD="$CMD ${{ inputs.path }}"
          CMD="$CMD -o ${{ inputs.output }}"
          if [ -n "${{ inputs.traces }}" ]; then
            CMD="$CMD --traces ${{ inputs.traces }}"
          fi
        elif [ "$COMMAND" = "flow" ]; then
          CMD="$CMD ${{ inputs.path }}"
          CMD="$CMD -o ${{ inputs.output }}"
        fi

        echo "::group::AI Trace Auditor"
        echo "Running: $CMD"
        eval $CMD
        EXIT_CODE=$?
        echo "::endgroup::"

        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

        # Fail if gaps found and fail-on-gaps is true
        if [ "${{ inputs.fail-on-gaps }}" = "true" ] && [ "$EXIT_CODE" -eq 1 ]; then
          echo "::error::EU AI Act compliance gaps detected. See report at ${{ inputs.output }}"
          exit 1
        fi

        exit 0
