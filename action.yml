name: "AI Trace Auditor — EU AI Act Compliance Suite"
description: "EU AI Act compliance for AI codebases. Audits Articles 11, 12, 13, 50 + GDPR 30. Runs locally in CI."
author: "Bipin Rimal"

branding:
  icon: "shield"
  color: "green"

inputs:
  command:
    description: "Command to run: comply (full suite), audit (Art 12), docs (Art 11), flow (Art 13)"
    required: false
    default: "comply"
  path:
    description: "Codebase directory to scan (for comply/docs/flow) or trace file (for audit)"
    required: false
    default: "."
  traces:
    description: "Path to trace file or directory for Article 12 audit"
    required: false
    default: ""
  output:
    description: "Output file or directory path"
    required: false
    default: "compliance-report.md"
  split:
    description: "Write individual report files to output directory (comply only)"
    required: false
    default: "false"
  regulation:
    description: "Filter to specific regulation (audit only)"
    required: false
    default: ""
  risk-level:
    description: "Risk classification (high_risk, all)"
    required: false
    default: "high_risk"
  format:
    description: "Trace input format (auto, otel, langfuse, claude_code, raw)"
    required: false
    default: "auto"
  report-format:
    description: "Report output format (markdown, json, both) — audit only"
    required: false
    default: "markdown"
  evidence-pack:
    description: "Generate evidence pack in this directory (comply only, replaces --output)"
    required: false
    default: ""
  slack-webhook:
    description: "Slack webhook URL for compliance notifications"
    required: false
    default: ""
  email-to:
    description: "Email address for compliance report delivery"
    required: false
    default: ""
  fail-on-gaps:
    description: "Fail the action if compliance gaps are found"
    required: false
    default: "true"
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"

outputs:
  compliance-score:
    description: "Overall compliance score (0-100), empty if no traces"
    value: ${{ steps.run.outputs.score }}
  exit-code:
    description: "Exit code (0 = pass, 1 = gaps found)"
    value: ${{ steps.run.outputs.exit_code }}
  report-path:
    description: "Path to the generated report"
    value: ${{ inputs.output }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install AI Trace Auditor
      shell: bash
      run: pip install ai-trace-auditor

    - name: Run compliance check
      id: run
      shell: bash
      run: |
        set +e
        echo "::group::AI Trace Auditor"

        COMMAND="${{ inputs.command }}"

        if [ "$COMMAND" = "audit" ]; then
          ARGS=("${{ inputs.path }}" --format "${{ inputs.format }}" --report-format "${{ inputs.report-format }}" -o "${{ inputs.output }}" --risk-level "${{ inputs.risk-level }}")
          if [ -n "${{ inputs.regulation }}" ]; then
            ARGS+=(-r "${{ inputs.regulation }}")
          fi
          aitrace audit "${ARGS[@]}"
        elif [ "$COMMAND" = "comply" ]; then
          ARGS=("${{ inputs.path }}" --risk-level "${{ inputs.risk-level }}")
          if [ -n "${{ inputs.evidence-pack }}" ]; then
            ARGS+=(--evidence-pack "${{ inputs.evidence-pack }}")
          else
            ARGS+=(-o "${{ inputs.output }}")
          fi
          if [ -n "${{ inputs.traces }}" ]; then
            ARGS+=(--traces "${{ inputs.traces }}")
          fi
          if [ "${{ inputs.split }}" = "true" ]; then
            ARGS+=(--split)
          fi
          aitrace comply "${ARGS[@]}"
        elif [ "$COMMAND" = "docs" ]; then
          ARGS=("${{ inputs.path }}" -o "${{ inputs.output }}")
          if [ -n "${{ inputs.traces }}" ]; then
            ARGS+=(--traces "${{ inputs.traces }}")
          fi
          aitrace docs "${ARGS[@]}"
        elif [ "$COMMAND" = "flow" ]; then
          aitrace flow "${{ inputs.path }}" -o "${{ inputs.output }}"
        fi

        EXIT_CODE=$?
        echo "::endgroup::"
        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

        if [ "${{ inputs.fail-on-gaps }}" = "true" ] && [ "$EXIT_CODE" -eq 1 ]; then
          echo "::error::EU AI Act compliance gaps detected. See report at ${{ inputs.output }}"
          exit 1
        fi

        exit 0

    - name: Send Slack notification
      if: ${{ inputs.slack-webhook != '' }}
      shell: bash
      env:
        SLACK_WEBHOOK: ${{ inputs.slack-webhook }}
        SCAN_PATH: ${{ inputs.path }}
      run: |
        pip install ai-trace-auditor[notify] -q
        python3 -c "
import os, pathlib
from ai_trace_auditor.comply.runner import run_full_compliance
from ai_trace_auditor.notify.slack import send_slack_notification
pkg = run_full_compliance(pathlib.Path(os.environ['SCAN_PATH']))
ok = send_slack_notification(os.environ['SLACK_WEBHOOK'], pkg)
print('Slack notification sent' if ok else 'Slack notification failed')
"
